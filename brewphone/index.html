<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071018">
  <meta name="color-scheme" content="light dark">
  <title>BrewPhone｜潮騒館の最後の編集</title>
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/apps.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/emergency.css">
</head>
<body class="phone-page">
  <div class="phone-device" aria-label="BrewPhone investigation device">
    <div class="phone-speaker" aria-hidden="true"></div>
    <div class="phone-shell">
      <header class="status-bar">
        <span id="phone-time">--:--</span>
        <strong><span class="status-dot"></span> BREWPHONE</strong>
        <span id="connection">LOCAL ◒</span>
      </header>
      <div id="emergency-banner" class="emergency-banner hidden" role="alert"></div>
      <main id="phone-main" class="phone-main" aria-live="polite">
        <div class="boot-screen"><span class="boot-mark">B</span><p>捜査端末を起動中</p></div>
      </main>
      <nav class="dock" id="phone-dock" aria-label="BrewPhone メインナビゲーション">
        <button data-route="home" aria-label="ホーム"><span>⌂</span><small>Home</small></button>
        <button data-route="search" aria-label="検索"><span>⌕</span><small>Search</small></button>
        <button data-route="evidence" aria-label="証拠ボード"><span>◇</span><small>Evidence</small></button>
        <button data-route="investigation-notes" aria-label="捜査ノート"><span>✎</span><small>Notes</small></button>
        <button data-route="mission" aria-label="今日のミッション"><span>◎</span><small>Mission</small></button>
      </nav>
    </div>
  </div>

  <div class="phone-modal hidden" id="phone-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="phone-modal-card">
      <button id="modal-close" class="modal-x" type="button" aria-label="閉じる">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="phone-toast-region" aria-live="polite" aria-atomic="true"></div>

  <script src="../shared/js/storage.js"></script>
  <script src="../shared/js/image-fallback.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/unlock.js"></script>
  <script src="js/investigation-notes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
